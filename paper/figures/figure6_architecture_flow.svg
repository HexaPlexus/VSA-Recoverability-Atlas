<text x="830.0" y="208" fill="#1c222b" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">Approximate VSA</text>
<text x="830.0" y="230" fill="#1c222b" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">semantic view</text>
<rect x="1020" y="60" width="170" height="90" rx="12" fill="#f5e8fb" stroke="#1c222b" stroke-width="1"/>
<text x="1105.0" y="88" fill="#1c222b" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">Verify</text>
<text x="1105.0" y="110" fill="#1c222b" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">and accept</text>
<rect x="1020" y="180" width="170" height="90" rx="12" fill="#f9e0e0" stroke="#1c222b" stroke-width="1"/>
<text x="1105.0" y="208" fill="#1c222b" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">Native decoder</text>
<text x="1105.0" y="230" fill="#1c222b" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">or abstain</text>
<rect x="700" y="320" width="260" height="90" rx="12" fill="#eef0f4" stroke="#1c222b" stroke-width="1"/>
<text x="830.0" y="348" fill="#1c222b" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">Fallback only</text>
<text x="830.0" y="370" fill="#1c222b" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">if nondominated</text>
<rect x="1020" y="320" width="170" height="90" rx="12" fill="#f3e6cf" stroke="#1c222b" stroke-width="1"/>
<text x="1105.0" y="348" fill="#1c222b" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">Stop or</text>
<text x="1105.0" y="370" fill="#1c222b" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">document limit</text>
