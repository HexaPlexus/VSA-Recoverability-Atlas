<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="780" viewBox="0 0 1140 780">
<title>Sequential escalation economics</title>
<rect x="0" y="0" width="1140" height="780" rx="0" fill="#f8f9fb" stroke="none" stroke-width="1"/>
<text x="24" y="34" fill="#1c222b" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="start">Figure 5. Sequential escalation economics</text>
<text x="24" y="58" fill="#6c7a89" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="normal" text-anchor="start">Clean non-easy common F=3 cell. Panel A uses rates; Panel B uses seconds.</text>
<text x="100" y="120" fill="#1c222b" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="start">Panel A. Verified exit versus break-even exit</text>
<text x="100" y="420" fill="#1c222b" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="start">Panel B. Expected cascade latency versus always-BCF latency</text>
<rect x="130" y="292.5" width="180" height="47.5" rx="8" fill="#2a6dc6" stroke="#1c222b" stroke-width="1"/>
<text x="220" y="364" fill="#1c222b" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="normal" text-anchor="middle">Actual verified exit</text>
<text x="220" y="284.5" fill="#1c222b" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">0.250</text>
<rect x="390" y="290.314342" width="180" height="49.685658" rx="8" fill="#d67924" stroke="#1c222b" stroke-width="1"/>
<text x="480" y="364" fill="#1c222b" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="normal" text-anchor="middle">Break-even exit</text>
<text x="480" y="282.314342" fill="#1c222b" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">0.262</text>
<text x="640" y="255" fill="#6c7a89" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="normal" text-anchor="start">Observed exit stays below the break-even threshold.</text>
<text x="640" y="278" fill="#c24343" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="start">0.250 &lt; 0.262</text>
<rect x="130" y="481.666667" width="180" height="158.333333" rx="8" fill="#785ab4" stroke="#1c222b" stroke-width="1"/>
<text x="220" y="664" fill="#1c222b" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="normal" text-anchor="middle">Expected cascade</text>
<text x="220" y="473.666667" fill="#1c222b" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">0.0376s</text>
<rect x="390" y="483.467335" width="180" height="156.532665" rx="8" fill="#3b914e" stroke="#1c222b" stroke-width="1"/>
<text x="480" y="664" fill="#1c222b" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="normal" text-anchor="middle">Always BCF</text>
<text x="480" y="475.467335" fill="#1c222b" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">0.0372s</text>
<text x="640" y="555" fill="#6c7a89" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="normal" text-anchor="start">Measured p50 costs imply that probing with MAP does not amortize on non-easy cells.</text>
<text x="640" y="578" fill="#c24343" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="start">Cascade 0.0376s &gt; BCF 0.0372s</text>
<text x="100" y="715" fill="#6c7a89" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="normal" text-anchor="start">Break-even uses p_exit &gt; C_fast / C_fallback. This plot supports sequential economics only.</text>
</svg>
