<text x="1020.0" y="218" fill="#1c222b" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">Fallback or</text>
<text x="1020.0" y="240" fill="#1c222b" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" text-anchor="middle">abstention</text>
