name: tests

on:
  push:
    branches:
      - main
      - master
      - release/**
      - codex/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install core package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[competitors]"

      - name: Validate registry and claims
        run: python scripts/validate_evidence_registry.py

      - name: Run test suite
        run: python -m pytest -q

      - name: Build manuscript figures
        run: python scripts/build_manuscript_figures.py

      - name: Build release candidate
        run: python scripts/build_release_candidate.py

      - name: Verify generated artifacts are up to date
        run: git diff --exit-code
