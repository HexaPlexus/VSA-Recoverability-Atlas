name: tests

on:
  push:
    branches:
      - main
      - master
      - release/**
      - codex/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install core package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[competitors]"

      - name: Build public atlas files
        run: python scripts/build_evidence_tables.py

      - name: Validate registry and claims
        run: python scripts/validate_evidence_registry.py

      - name: Run test suite
        run: python -m pytest -q
